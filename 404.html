<!doctype html><html lang="fr"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tennis AI Coach — Session partagée</title>
<meta name="apple-itunes-app" content="app-id=6777688982">
<style>
:root{--teal:#0F766E}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#F5F7F8;color:#0b1f1d;
 min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.card{background:#fff;border-radius:24px;box-shadow:0 12px 40px rgba(0,0,0,.10);max-width:380px;width:100%;
 padding:34px 26px;text-align:center}
.logo{width:78px;height:78px;border-radius:18px;background:linear-gradient(135deg,#1B69C9,#0F766E);margin:0 auto 18px;
 display:flex;align-items:center;justify-content:center;font-size:38px}
h1{font-size:21px;margin-bottom:8px}
p{color:#5b6b69;font-size:15px;line-height:1.5;margin-bottom:22px}
.btn{display:block;background:var(--teal);color:#fff;text-decoration:none;font-weight:700;font-size:16px;
 padding:15px;border-radius:14px;margin-bottom:12px}
.small{font-size:12px;color:#9aa7a5;margin-top:14px}
</style></head><body>
<div class="card">
  <div class="logo">🎾</div>
  <h1>Un ami t'a envoyé une session</h1>
  <p>Installe <b>Tennis AI Coach</b> puis rouvre le lien : ta session s'ouvrira dans l'app.</p>
  <a class="btn" href="https://apps.apple.com/app/id6777688982">Télécharger sur l'App Store</a>
  <div class="small" id="sid"></div>
</div>
<script>
  var m = location.pathname.match(/\/s\/([^\/?#]+)/);
  if (m) document.getElementById('sid').textContent = 'Session ' + m[1];
</script>
</body></html>
